<style>
  :root {
    --transition-theme: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
  }

  /* Tema oscuro por defecto */
  html[data-theme="dark"] {
    --global-bg-color: #121212;          /* negro suave */
    --global-base-color: #121212;
    --global-border-color: #2a2a2a;
    --global-text-color: #f3f3f3;
    --global-text-color-light: #cfcfcf;
    --global-link-color: #4db6d6;
    --global-link-color-hover: #7ccbe3;
    --global-link-color-visited: #8fd3e8;
    --global-masthead-link-color: #f3f3f3;
    --global-masthead-link-color-hover: #bdbdbd;
    --global-code-background-color: #f5f5f5;
    --global-code-text-color: #222;
    --global-fig-caption-color: #b8b8b8;
    --global-thead-color: #e9e9e9;
  }

  /* Tema claro */
  html[data-theme="light"] {
    --global-bg-color: #ffffff;
    --global-base-color: #7a8288;
    --global-border-color: #ececec;
    --global-text-color: #222222;
    --global-text-color-light: #666666;
    --global-link-color: #2f7f93;
    --global-link-color-hover: #1f5c6b;
    --global-link-color-visited: #5ca0b1;
    --global-masthead-link-color: #222222;
    --global-masthead-link-color-hover: #555555;
    --global-code-background-color: #fafafa;
    --global-code-text-color: #222222;
    --global-fig-caption-color: #666666;
    --global-thead-color: #efefef;
  }

  html, body, .masthead, .page__footer, .sidebar, .archive, .page {
    transition: var(--transition-theme);
  }

  .theme-toggle {
    margin-left: 1rem;
    padding: 0.45rem 0.8rem;
    border: 1px solid var(--global-border-color);
    border-radius: 999px;
    background: transparent;
    color: var(--global-masthead-link-color);
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
  }

  .theme-toggle:hover {
    color: var(--global-masthead-link-color-hover);
    border-color: var(--global-masthead-link-color-hover);
  }
</style>

<script>
  (function () {
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const theme = savedTheme || (prefersDark ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>


<script>
    document.addEventListener("DOMContentLoaded", function () {
      const button = document.getElementById("theme-toggle");
      if (!button) return;
  
      function updateButton(theme) {
        button.textContent = theme === "dark" ? "☀️ Claro" : "🌙 Oscuro";
      }
  
      let currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
      updateButton(currentTheme);
  
      button.addEventListener("click", function () {
        currentTheme = currentTheme === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", currentTheme);
        localStorage.setItem("theme", currentTheme);
        updateButton(currentTheme);
      });
    });
  </script>
